server{
    listen 80;
    listen [::]:80;   # faltou apenas por o ":" antes do 80 
    server_name localhost;

    return 301 https://$server_name$request_uri;
}

server{
    listen 443 ssl;
    listen [::]:443 ssl; # e aqui tmb
    server_name localhost;

    ssl_certificate /etc/nginx/certs/https-autoassinado.crt;
    ssl_certificate_key /etc/nginx/certs/https-autoassinado.key;# estava a dar erro aqui pq não adiconei no ssl_certificate o "_key" final lol

    ssl_protocols TLSv1.2 TLSv1.3; #apenas permite usar estas versões (não permite usar versões antigas)
    ssl_ciphers HIGH:!aNULL:!MD5;  # proibe usar algoritmos inseguros

    ssl_session_cache shared:SSL:10m; #guardar sessão por 10 minutos (3handshake gasta processamento)
    ssl_session_timeout 10m;

    # Fetchs terão segurança:
    location /{
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /criar-eleicao{
        proxy_pass http://backend:4000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

