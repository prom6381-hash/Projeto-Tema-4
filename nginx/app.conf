server{
    listen 80;
    listen [::]:80;   # faltou apenas por o ":" antes do 80 
    server_name localhost;

    return 301 https://$server_name$request_uri;
}
server{
    listen 443 ssl;
    listen [::]:443 ssl; # e aqui tmb
    server_name localhost;

    ssl_certificate /etc/nginx/certs/https-autoassinado.crt;
    ssl_certificate_key /etc/nginx/certs/https-autoassinado.key;# estava a dar erro aqui pq não adiconei no ssl_certificate o "_key" final

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location /{
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }


}