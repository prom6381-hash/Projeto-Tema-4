services:
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: interface-web
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:4000
    volumes:
      - ./app/public:/app/public
    networks:
      - network_sistema_todo

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: backend
    depends_on:
      - servidor-ca
      - mongo
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development  
      - CA_HOST=servidor-ca
      - CA_PORT=5000
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET}
      - HMAC_SECRET=${HMAC_SECRET}
      - EMAIL_HOST=${EMAIL_HOST}
      - EMAIL_PORT=${EMAIL_PORT}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    volumes:
      - ./:/app
    networks:
      - network_sistema_todo
    env_file:
      - .env

  servidor-ca:
    build:
      context: ./servidor-ca
      dockerfile: Dockerfile
    container_name: servidor_criptografia
    ports:
      - "5000:5000"
    environment:
      - CA_CERT=/app/ca_cert.pem
      - CA_KEY=/app/ca_key.pem
    volumes:
      - ./servidor-ca:/app
      - ./servidor-ca/certificados:/app/certificados
    networks:
      - network_sistema_todo
    env_file:
      - .env

  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    networks:
      - network_sistema_todo

      
networks:
  network_sistema_todo:
    driver: bridge

