<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Iniciar Sessão</title>
</head>
<body>
    <div class="Box">
        <h1>Bem-Vindo de Volta!</h1>

        <p style="font-size: 13px;">
            <strong>Ainda não tem uma conta?</strong>
            <a href="Registar-se.html" id="JTC">Registe-se aqui</a>
        </p>

        <form id="loginForm" action="/login" method="POST" class="login-form">

            <label for="username">Nome:</label><br>
            <input type="text" name="username" id="username" placeholder="Nome de Utilizador" required><br>

            <label for="password">Palavra-Passe:</label><br>
            <input type="password" name="password" id="password" placeholder="Palavra-passe" required><br>

            <button type="submit" class="login-button">Iniciar Sessão</button>

        </form>
    </div>

<script>

const form = document.getElementById("loginForm");

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const response = await fetch("/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: new URLSearchParams({ username, password })
    });

    const text = await response.text();

    if (text.includes("Login bem-sucedido")) {

        sessionStorage.setItem("loggedUser", username);

        window.location.href = "/perfil.html";

    } else {

        alert("Username ou password incorretos!");

    }

});

</script>

</body>
</html>
