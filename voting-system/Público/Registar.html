<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Registar</title>
</head>
<body>
    <div class="Box">
        <h1>Bem-Vindo ao SecureView!</h1>
        <p style="font-size: 13px;"><strong> Já tem uma conta? </strong><a href="Iniciar Sessão.html" id="JTC">Inicie sessão aqui</a></p>
        
        <form action="/register" method="POST" class="login-form">
            <label for="username">Nome:</label><br>
            <input type="text" name="username" id="username" placeholder="Nome de Utilizador" required><br>
            <label for="email">Email:</label><br>
            <input type="email" name="email" id="email" placeholder="Email" required><br>
            <label for="password">Palavra-Passe:</label><br>
            <input type="password" name="password" id="password" placeholder="Palavra-passe" required><br>
            <button type="submit" class="login-button">Registar-se</button>
    </div> 
</body>
</html>
