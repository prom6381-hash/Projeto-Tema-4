<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Criar Eleição</title>
</head>
<body>

    <nav>
        <a href="votar_ou_criar.html" class="nav-link">
            <img src="imagens/logo.png" alt="Logo" class="logo">
            <h1>VotoSeguro</h1>
        </a>
        <div class="sessao" id="mostraremailsessao"></div>
    </nav>    

    <div class="eleição">
        
        <h1>Configurar eleição privada</h1>

        <div>
            <p>Escreva os emails que irão ter acesso ou importe um ficheiro com os emails</p>
        </div>
        
        <div class="opcoes-eleicao" id="lista-email">
            <div class="campo-email-container">
                <input type="text" name="email_eleicao" placeholder="XXXX@instituicao.pt">
            </div>
        </div>

        <div style="display: flex; gap: 10px; width: 100%; max-width: 300px; margin-top: 10px;">
            <button class="Botão" style="flex: 1; padding: 12px" onclick="adicionar_email()">Adicionar email</button>
            <button class="Botão" style="flex: 1; padding: 12px;" onclick="remover_email()">Remover email</button>
        </div>

        <input type="file" accept=".txt" onchange="importarFicheiro(this)" style="margin: 15px 0;">

        <button class="Botão btn-opcao" onclick="verificar_existe_email()">Começar a criar a eleição!</button>
        <a href="eleicao_priv.html" style="width: 100%; max-width: 200px;">
            <button class="Botão btn-opcao" style="width: 100%;">Voltar</button>
        </a>
    </div>

    <script src="./js/index.js"></script>
</body>
</html>
