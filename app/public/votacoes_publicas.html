<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>VotoSeguro — Eleições Públicas</title>
</head>
<body>

    <nav>
        <a href="votar_ou_criar.html" class="nav-link">
            <img src="imagens/logo.png" alt="Logo" class="logo">
            <h1>VotoSeguro</h1>
        </a>
        <div class="sessao" id="mostraremailsessao"></div>
    </nav>

    <div class="lista-eleicoes-wrapper">

        <div class="lista-eleicoes-header">
            <div>
                <h1>Eleições Públicas</h1>
                <p>Selecione a eleição em que pretende participar.</p>
            </div>
            <a href="votar_ou_criar.html" class="Botão" style="padding: 10px 20px; font-size: 0.88rem; background: var(--navy-light); flex-shrink: 0;">
                ← Voltar
            </a>
        </div>

        <div class="search-bar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0;">
                <circle cx="11" cy="11" r="7" stroke="#6B7A99" stroke-width="2"/>
                <path d="M16.5 16.5l4 4" stroke="#6B7A99" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input type="text" id="pesquisa-eleicao" placeholder="Pesquise por nome ou ID da votação..." style="border: none; box-shadow: none; margin: 0; padding: 0; flex: 1; font-size: 0.95rem;">
            <button class="Botão" id="btn-pesquisar" style="padding: 9px 20px; font-size: 0.88rem; flex-shrink: 0;">
                Pesquisar
            </button>
        </div>

        <div class="ListaVotos" id="lista-publicas" style="flex-direction: column; align-items: stretch; width: 100%; padding-left: 0; gap: 12px;"></div>

    </div>

    <script src="./js/index.js"></script>
</body>
</html>
