<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Criar Eleição</title>
</head>
<body>

        <nav>
            <a href="votar_ou_criar.html" class="nav-link">
                <img src="imagens/logo.png" alt="Logo" class="logo">
                <h1>VotoSeguro</h1>
            </a>
            <div class="sessao" id="mostraremailsessao"></div>
        </nav>    
<div class="eleição">
    <h1>Configurar eleição privada, por domínios </h1>

    <div>
        <p>Digite o(s) domínio(s) que deseja.</p>
    </div>
    
    <div class="opcoes-eleicao">
        <div id="lista-dominios">
        </div>
        <input type="text" id="dominio" placeholder="@instituicao.pt">
        <div id="lista-dominios-guardados" style="margin-top: 15px; text-align: left; "></div>

    </div>
    <div style="display: flex; gap: 10px;">
        <button class="Botão" style="flex: 1;; padding: 12px" onclick="adicionar_dominio()">Adicionar domínio</button>
        <button class="Botão" style="flex: 1; padding: 12px;" onclick="remover_dominio()">Remover domínio</button>
    </div>

        <button class="Botão btn-opcao" onclick="verificar_existe_dominio()">Começar a criar a eleição!</button>
        <a href="eleicao_priv.html">
        <button class="Botão btn-opcao">Voltar</button>
    </a>
</div>
    <script src="./js/index.js"></script>
</body>
</html>
