<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>VotoSeguro — Verificar Token</title>
</head>
<body>

    <nav>
        <a href="votar_ou_criar.html" class="nav-link">
            <img src="imagens/logo.png" alt="Logo" class="logo">
            <h1>VotoSeguro</h1>
        </a>
        <div class="sessao" id="mostraremailsessao"></div>
    </nav>

    <div class="PgInicial">
        <div class="token-icon">
            <svg width="30" height="30" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 10h20M6 16h12M6 22h8" stroke="#4A56A6" stroke-width="2" stroke-linecap="round"/>
                <circle cx="25" cy="22" r="5" fill="#E8EAFF" stroke="#4A56A6" stroke-width="2"/>
                <path d="M23 22l1.5 1.5L27 20" stroke="#4A56A6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h2>Verificar Token</h2>
        <p>Introduza o código de autenticação que foi enviado para o seu email.</p>

        <label class="field-label" for="token">Código de verificação</label>
        <input
            type="text"
            placeholder="XXXXX"
            required
            id="token"
            style="text-align: center; letter-spacing: 0.25em; font-size: 1.4rem; font-weight: 600; margin-bottom: 20px;"

        >

        <button onclick="verificar_token()" class="Botão" type="button" style="width: 100%; padding: 14px; font-size: 1rem;">
            Verificar Token
        </button>
    </div>

    <script src="./js/index.js"></script>
</body>
</html>
