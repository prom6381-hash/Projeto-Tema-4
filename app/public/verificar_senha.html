<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>VotoSeguro — Autenticação</title>
</head>
<body>

    <nav>
        <a href="votar_ou_criar.html" class="nav-link">
            <img src="imagens/logo.png" alt="Logo" class="logo">
            <h1>VotoSeguro</h1>
        </a>
        <div class="sessao" id="mostraremailsessao"></div>
    </nav>

    <div class="PgInicial">
        <div class="token-icon">
            <svg width="30" height="30" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="10" r="5" stroke="#4A56A6" stroke-width="2"/>
                <path d="M6 28c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="#4A56A6" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </div>
        <h2>Autenticação</h2>
        <p>Introduza a sua palavra-passe para continuar.</p>

        <label class="field-label" for="verificar_password">Palavra-passe</label>
        <input type="password" placeholder="A sua palavra-passe" id="verificar_password" style="margin-bottom: 20px;">

        <button onclick="verificarSenha()" class="Botão" type="button" style="width: 100%; padding: 14px; font-size: 1rem;">
            Verificar palavra-passe
        </button>
    </div>

    <script src="./js/index.js"></script>
</body>
</html>
