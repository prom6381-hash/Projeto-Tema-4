<!DOCTYPE html>
<html lang="pt">
<head>

    <link rel="stylesheet" href="css/style.css">
    <title>Escolher tipo de Eleição</title>
</head>
<body>
    <nav>
        <a href="votar_ou_criar.html" class="nav-link">
