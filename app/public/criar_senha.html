<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>VotoSeguro — Registo</title>
</head>
<body>

    <nav>
        <a href="votar_ou_criar.html" class="nav-link">
            <img src="imagens/logo.png" alt="Logo" class="logo">
            <h1>VotoSeguro</h1>
        </a>
        <div class="sessao" id="mostraremailsessao"></div>
    </nav>

    <div class="PgInicial">
        <h2>Criar palavra-passe</h2>
        <p style="margin-bottom: 24px;">Defina a palavra-passe que irá utilizar para aceder ao sistema.</p>

        <label class="field-label" for="password">Palavra-passe</label>
        <input type="password" placeholder="Introduza a sua palavra-passe" id="password">

        <div id="requisitos-password">
            <p id="maiuscula">❌ Pelo menos 1 letra maiúscula</p>
            <p id="minuscula">❌ Pelo menos 1 letra minúscula</p>
            <p id="numero">❌ Pelo menos 1 número</p>
            <p id="especial">❌ Pelo menos 1 carácter especial</p>
            <p id="tamanho">❌ Pelo menos 8 caracteres</p>
        </div>

        <label class="field-label" for="confirmar_password">Confirmar palavra-passe</label>
        <input type="password" placeholder="Confirme a sua palavra-passe" id="confirmar_password" style="margin-bottom: 24px;">

        <button onclick="criarSenha()" class="Botão" type="button" style="width: 100%; padding: 14px; font-size: 1rem;">
            Criar palavra-passe
        </button>
    </div>

    <script src="./js/index.js"></script>
</body>
</html>
